<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cricket Corner Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e6e6e6;
    }

    .container {
      width: 60%;
      margin: auto;
      margin-top: 80px;
    }

    .logo {
      font-size: 18px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .logo span {
      color: #1abc9c;
    }

    .title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 40px;
    }

    .title span {
      color: #1abc9c;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #aaa;
      outline: none;
    }

    .btn-container {
      text-align: center;
      margin-top: 30px;
    }

    .btn {
      background-color: #1abc9c;
      border: none;
      padding: 10px 25px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #16a085;
    }

    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .footer-text a {
      color: #1abc9c;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      CRICKET<span>CORNER</span>
    </div>

    <div class="title">
      Login to CRICKET<span>CORNER</span>
    </div>

    <form>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter e-mail:">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter Password:">
      </div>

      <div class="btn-container">
        <button class="btn">Login</button>
      </div>

      <div class="footer-text">
        Don’t have an account? <a href="#">Sign in</a>
      </div>

    </form>

  </div>

</body>
</html>
