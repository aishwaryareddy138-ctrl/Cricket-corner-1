<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cricket Corner Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #efefef;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #999;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .logo span {
      color: #1abc9c;
    }

    .nav-links a {
      margin-left: 40px;
      text-decoration: none;
      color: black;
      font-size: 16px;
    }

    .nav-links a:hover {
      color: #1abc9c;
    }

    /* Products Section */
    .products {
      display: flex;
      justify-content: space-around;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .product {
      text-align: center;
      margin-bottom: 40px;
    }

    .product img {
      width: 250px;
      height: 180px;
      object-fit: contain;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 20px;
      background-color: #8ccbd6;
      border-radius: 20px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #6fb3bf;
    }

    /* Shoes section alignment */
    .shoes {
      margin-left: 80px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">CRICKET<span>CORNER</span></div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop&Save</a>
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
    </div>
  </div>

  <!-- Products -->
  <div class="products">

    <div class="product">
      <img src="C:\Users\sosak\Downloads\bats.jpg" alt="Bats">
      <br>
      <a href="#" class="btn">Bats</a>
    </div>

    <div class="product">
      <img src="C:\Users\sosak\Downloads\balls.avif" alt="Balls">
      <br>
      <a href="#" class="btn">Balls</a>
    </div>

    <div class="product">
      <img src="C:\Users\sosak\Downloads\gloves.jpg" alt="Gloves">
      <br>
      <a href="#" class="btn">Gloves</a>
    </div>

  </div>

  <!-- Shoes -->
  <div class="product shoes">
    <img src="C:\Users\sosak\Downloads\shoes.jpg"alt="Shoes">
    <br>
    <a href="#" class="btn">Shoes</a>
  </div>

</body>
</html>
